<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI助手 - 每日快讯</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #fff, #a8c0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header p {
            color: #8892b0;
            font-size: 14px;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .tab {
            flex: 1;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #8892b0;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
            font-size: 14px;
        }
        
        .tab.active {
            background: rgba(102, 126, 234, 0.3);
            border-color: #667eea;
            color: #fff;
        }
        
        .content {
            display: none;
        }
        
        .content.active {
            display: block;
        }
        
        .news-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .news-header {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .news-emoji {
            font-size: 24px;
            margin-right: 12px;
        }
        
        .news-title {
            font-size: 16px;
            font-weight: 500;
            flex: 1;
        }
        
        .news-time {
            font-size: 12px;
            color: #8892b0;
        }
        
        .news-body {
            font-size: 14px;
            line-height: 1.8;
            color: #ccc;
            white-space: pre-wrap;
        }
        
        .loading {
            text-align: center;
            color: #8892b0;
            padding: 40px;
        }
        
        .error {
            text-align: center;
            color: #ff6b6b;
            padding: 40px;
        }
        
        .empty {
            text-align: center;
            color: #8892b0;
            padding: 40px;
        }
        
        .footer {
            text-align: center;
            margin-top: 40px;
            color: #8892b0;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="avatar">🤖</div>
            <h1>AI小助手</h1>
            <p>每日自动推送精选资讯</p>
        </div>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab('latest')">最新消息</div>
            <div class="tab" onclick="switchTab('history')">历史记录</div>
            <div class="tab" onclick="switchTab('schedule')">推送安排</div>
        </div>
        
        <div id="latest" class="content active">
            <div class="loading">加载中...</div>
        </div>
        
        <div id="history" class="content">
            <div class="loading">加载中...</div>
        </div>
        
        <div id="schedule" class="content">
            <div class="news-item">
                <div class="news-header">
                    <span class="news-emoji">🌅</span>
                    <span class="news-title">07:00 国际要闻早报</span>
                </div>
                <div class="news-body">过去24小时全球重要新闻</div>
            </div>
            <div class="news-item">
                <div class="news-header">
                    <span class="news-emoji">🤖</span>
                    <span class="news-title">08:00 AI热点早报</span>
                </div>
                <div class="news-body">AI行业最新动态与大模型资讯</div>
            </div>
            <div class="news-item">
                <div class="news-header">
                    <span class="news-emoji">✈️</span>
                    <span class="news-title">09:00 民航业新闻早报</span>
                </div>
                <div class="news-body">携程/去哪儿/同程及航司直销动态</div>
            </div>
            <div class="news-item">
                <div class="news-header">
                    <span class="news-emoji">📊</span>
                    <span class="news-title">18:00 A股港股收盘报告</span>
                </div>
                <div class="news-body">恒生互联网/上证300/白酒/消费指数</div>
            </div>
            <div class="news-item">
                <div class="news-header">
                    <span class="news-emoji">🌤️</span>
                    <span class="news-title">22:00 明日天气穿衣提醒</span>
                </div>
                <div class="news-body">北京明日天气与穿衣建议</div>
            </div>
        </div>
        
        <div class="footer">
            <p>🤖 由 AI 助手驱动</p>
        </div>
    </div>
    
    <script>
        let newsData = [];
        
        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }
        
        function renderNews(containerId, newsList) {
            const container = document.getElementById(containerId);
            if (!newsList || newsList.length === 0) {
                container.innerHTML = '<div class="empty">暂无消息</div>';
                return;
            }
            
            const emojiMap = {
                '国际要闻早报': '🌅',
                'AI热点早报': '🤖',
                '民航业新闻早报': '✈️',
                'A股港股收盘报告': '📊',
                '明日天气穿衣提醒': '🌤️'
            };
            
            container.innerHTML = newsList.map(news => `
                <div class="news-item">
                    <div class="news-header">
                        <span class="news-emoji">${emojiMap[news.type] || '📰'}</span>
                        <span class="news-title">${news.type}</span>
                        <span class="news-time">${news.time}</span>
                    </div>
                    <div class="news-body">${news.content}</div>
                </div>
            `).join('');
        }
        
        async function loadNews() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/buptcxy/ai-assistant/main/data.json');
                if (!response.ok) throw new Error('Failed to load');
                const data = await response.json();
                newsData = data.news || [];
                
                // 最新消息：只显示最近5条
                renderNews('latest', newsData.slice(0, 5));
                
                // 历史记录：显示全部
                renderNews('history', newsData);
            } catch (e) {
                document.getElementById('latest').innerHTML = '<div class="error">暂无消息</div>';
                document.getElementById('history').innerHTML = '<div class="error">暂无消息</div>';
            }
        }
        
        loadNews();
    </script>
</body>
</html>
