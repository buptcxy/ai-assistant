<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的AI助手 - 每日快讯</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #fff, #a8c0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header p {
            color: #8892b0;
            font-size: 14px;
        }
        
        .intro {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .intro h2 {
            font-size: 18px;
            margin-bottom: 12px;
            color: #a8c0ff;
        }
        
        .intro p {
            color: #8892b0;
            font-size: 14px;
            line-height: 1.8;
        }
        
        .schedule {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .schedule h2 {
            font-size: 18px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .schedule-item {
            display: flex;
            align-items: center;
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
        }
        
        .schedule-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(4px);
        }
        
        .schedule-item:last-child {
            margin-bottom: 0;
        }
        
        .time {
            min-width: 70px;
            font-size: 14px;
            font-weight: 600;
            color: #667eea;
        }
        
        .content {
            flex: 1;
        }
        
        .content .title {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 4px;
        }
        
        .content .desc {
            font-size: 12px;
            color: #8892b0;
        }
        
        .emoji {
            font-size: 24px;
            margin-right: 16px;
        }
        
        .footer {
            text-align: center;
            margin-top: 40px;
            color: #8892b0;
            font-size: 12px;
        }
        
        .footer a {
            color: #667eea;
            text-decoration: none;
        }
        
        @media (max-width: 480px) {
            body {
                padding: 20px 16px;
            }
            
            .header h1 {
                font-size: 24px;
            }
            
            .schedule-item {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .emoji {
                margin-bottom: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="avatar">🤖</div>
            <h1>你的AI小助手</h1>
            <p>每天自动推送精选资讯</p>
        </div>
        
        <div class="intro">
            <h2>🌟 关于我</h2>
            <p>我是一个AI助手，可以帮你查天气、搜新闻、分析股票、设置提醒...还能联网搜索、整理信息！每天自动推送精选资讯，让你随时掌握最新动态～</p>
        </div>
        
        <div class="schedule">
            <h2>📅 每日快讯安排</h2>
            
            <div class="schedule-item">
                <span class="emoji">🌅</span>
                <div class="content">
                    <div class="title">07:00 国际要闻早报</div>
                    <div class="desc">过去24小时全球重要新闻</div>
                </div>
            </div>
            
            <div class="schedule-item">
                <span class="emoji">🤖</span>
                <div class="content">
                    <div class="title">08:00 AI热点早报</div>
                    <div class="desc">AI行业最新动态与大模型资讯</div>
                </div>
            </div>
            
            <div class="schedule-item">
                <span class="emoji">✈️</span>
                <div class="content">
                    <div class="title">09:00 民航业新闻早报</div>
                    <div class="desc">携程/去哪儿/同程及航司直销动态</div>
                </div>
            </div>
            
            <div class="schedule-item">
                <span class="emoji">📊</span>
                <div class="content">
                    <div class="title">18:00 A股港股收盘报告</div>
                    <div class="desc">恒生互联网/上证300/白酒/消费指数</div>
                </div>
            </div>
            
            <div class="schedule-item">
                <span class="emoji">🌤️</span>
                <div class="content">
                    <div class="title">22:00 明日天气穿衣提醒</div>
                    <div class="desc">北京明日天气与穿衣建议</div>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>🤖 由 AI 助手驱动 · 让信息触手可及</p>
        </div>
    </div>
</body>
</html>
